{% extends 'base.html' %}

{% block content %}

<div class="page-title">

    <h1>
        <i class="bi bi-people-fill"></i>
        Clientes
    </h1>

</div>

<div class="container-carros">

{% for cliente in clientes %}

<div class="card-carro">

    <div class="nome-carro">
        {{ cliente.nome }}
    </div>

    <div class="info">
        <strong>CPF:</strong>
        {{ cliente.cpf }}
    </div>

    <div class="info">
        <strong>Telefone:</strong>
        {{ cliente.telefone }}
    </div>

    <div class="info">
        <strong>E-mail:</strong>
        {{ cliente.email }}
    </div>

    <a href="{% url 'cliente_detalhes' cliente.id %}"
       class="btn btn-alugar">
        Ver Histórico
    </a>

</div>

{% empty %}

<p>Nenhum cliente cadastrado.</p>

{% endfor %}

</div>

{% endblock %}
