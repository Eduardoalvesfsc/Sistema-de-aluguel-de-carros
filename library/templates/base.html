<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Aluguel de Carros</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        nav {
            margin-bottom: 20px;
        }

        a {
            margin-right: 10px;
        }

        form {
            display: inline;
        }

        button {
            margin-right: 10px;
        }

        li {
            margin-bottom: 12px;
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .error {
            border: 1px solid red;
            color: red;
            background-color: #ffe6e6;
        }

        .success {
            border: 1px solid green;
            color: green;
            background-color: #e6ffe6;
        }
    </style>
</head>

<body>

    <nav>
        <a href="{% url 'carro_list' %}">Carros</a>
        <a href="{% url 'meus_carros' %}">Meus Aluguéis</a>

        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <hr>

    <!-- ✅ MENSAGENS DO DJANGO -->
    {% if messages %}
        {% for message in messages %}
            <div class="message 
                {% if message.tags == 'error' %}error{% endif %}
                {% if message.tags == 'success' %}success{% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</body>
</html>
