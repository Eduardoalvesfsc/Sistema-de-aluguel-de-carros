{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - Locadora Ferreira</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'catalog/style.css' %}">

</head>

<body class="login-page">

    <div class="login-card-page">

        <div class="logo-page">
            <i class="bi bi-car-front-fill"></i>
            <h1>Locadora Ferreira</h1>
        </div>

        {% if form.errors %}
            <div class="erro-page">
                Usuário ou senha inválidos.
            </div>
        {% endif %}

        <form method="post">

            {% csrf_token %}

            <div class="form-group-page">
                <label>Usuário</label>
                {{ form.username }}
            </div>

            <div class="form-group-page">
                <label>Senha</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn-login-page">
                Entrar
            </button>

        </form>

    </div>

</body>
</html>
