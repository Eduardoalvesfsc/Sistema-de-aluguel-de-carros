{% extends 'base.html' %}

{% block content %}

<h1>Alugar um carro</h1>

<form method="post">
    {% csrf_token %}

    <h3>Dados do Cliente</h3>
    
    <div>
        <label>Nome:</label>
        {{ cliente_form.nome }}
    </div>

    <div>
        <label>CPF:</label>
        {{ cliente_form.cpf }}
    </div>

    <div>
        <label>Telefone:</label>
        {{ cliente_form.telefone }}
    </div>

    <div>
        <label>Email:</label>
        {{ cliente_form.email }}
    </div>

   <div>
        <label for="id_quantidade_dias">Quantidade de dias:</label>
        {{ form.quantidade_dias }}
    </div>

    <div>
        <label>Forma de pagamento:</label>
        {{ form.forma_pagamento }}
    </div>

    <div>
        <label>Observações:</label>
        {{ form.observacoes }}
    </div>

    <button type="submit">Confirmar Aluguel</button>
</form>
{% endblock %}
