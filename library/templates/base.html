<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Aluguel de Carros</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        nav {
            margin-bottom: 20px;
        }

        a {
            margin-right: 10px;
        }

        form {
            display: inline;
        }

        button {
            margin-right: 10px;
        }

        li {
            margin-bottom: 12px;
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <nav>
            {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
        {% endif %}

        <a href="{% url 'carro_list' %}">Carros</a>
        <a href="{% url 'meus_carros' %}">Meus Aluguéis</a>

        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
