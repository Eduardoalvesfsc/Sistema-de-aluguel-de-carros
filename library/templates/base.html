{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<head>
    <meta charset="UTF-8">
    <title>Locadora</title>    
    <link rel="stylesheet" href="{% static 'catalog/style.css' %}">

</head>

<body>

    <!-- MENU LATERAL -->

    <div class="sidebar">

        <div class="logo">
             <i class="fa-solid fa-car-side">Locadora Ferreira</i>
        </div>

        <div class="menu">

            <a href="{% url 'carro_list' %}">
                <i class="bi bi-car-front-fill"></i>
                Carros
            </a>

            <a href="{% url 'meus_carros' %}">
                <i class="bi bi-file-earmark-text"></i>
                Aluguéis
            </a>

            <a href="/cadastrar-funcionario/">
                👥 Funcionários
            </a>

            <a href="{% url 'clientes' %}">
                <i class="bi bi-people-fill"></i>
                Clientes
            </a>

            <a href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a href="/admin/">
                <i class="bi bi-gear-fill"></i>
                Administração
            </a>

        </div>

        <form action="{% url 'logout' %}" method="post" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="botao-sair sair">
                <i class="bi bi-box-arrow-right"></i>
                    Sair
            </button>
        </form>

    </div>

    <!-- CONTEÚDO -->

    <div class="main">

        <div class="topbar">

            <h3>
                Bem-vindo, {{ request.user.username }}
            </h3>

        </div>

        <div class="content">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>
</html>
